dev_addr: 127.0.0.1:8001
docs_dir: docs/src
edit_uri: 'blob/develop/docs/'
repo_url: https://github.com/saxix/django-smart-admin
site_author: sax
site_description: ""
site_dir: ./~build/docs
site_name: django-smart-admin
site_url: https://saxix.github.io/saxix/django-smart-admin
strict: false
exclude_docs: |
  ~*

markdown_extensions:
  - pymdownx.snippets

theme:
  name: "material"
  color_mode: auto
  user_color_mode_toggle: true
  features:
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - header.autohidex
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
  extra:
    version:
      provider: mike
      alias: true
  palette:
    # Palette toggle for light mode
    - scheme: default
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/weather-night
        name: Switch to light mode


watch:
  - src/
  - docs/
